[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests requiring ML model download (deselect with '-m not slow')",
]
addopts = "--strict-markers -v"

[tool.coverage.run]
source = ["services", "app"]
omit = [
    "services/grok_service.py",
    "fetch_insurance_emails.py",
    "init_db.py",
    "demo_*.py",
]

[tool.coverage.report]
fail_under = 40
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if __name__",
]

[tool.ruff]
ignore = ["RUF012", "RUF059", "SIM117", "B023", "BLE001", "DTZ005", "B017", "F401", "E402", "B008", "DTZ007", "S110", "G201", "TRY002", "SIM102", "RUF100"]
exclude = [
    "demo_triage.py",
    "demo_triage_v2.py",
    "fetch_insurance_emails.py",
    "init_db.py",
    "devflow/",
]
